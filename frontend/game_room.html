<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра | Scrabble</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="game-body">

<div class="top-bar">
    <a href="game_list.html">← К играм</a>
    <a id="userLink" href="profile.html"></a>
</div>

<div class="game-container">

    <!-- ЛЕВАЯ ПАНЕЛЬ — журнал событий -->
    <div class="history-panel">
        <h2>Журнал</h2>
        <div id="historyList" class="history-list"></div>
    </div>

    <!-- ЦЕНТР — поле для игры -->
    <div class="board-panel">
        <h2>Поле <span id="turnBanner" class="turn-banner"></span></h2>

        <!-- Лобби: показывается пока игра не началась -->
        <div id="lobbyBox" class="lobby-box">
            <p id="lobbyMsg">Подключение…</p>
            <button id="btnStart" class="primary hidden">Начать игру</button>
        </div>

        <div id="gameBoard" class="board"></div>

        <div class="letters-panel" id="lettersPanel">
            <!-- буквы игрока -->
        </div>
        <p class="hand-hint" id="handHint"></p>
    </div>

    <!-- ПРАВАЯ ПАНЕЛЬ — игроки и действия -->
    <div class="players-panel">

        <div id="playersList" class="players-list">
            <!-- Игроки динамически -->
        </div>

        <div class="tiles-left">
            Осталось фишек: <span id="tilesLeft">—</span>
        </div>
        <div class="tiles-left">
            Очки за текущий ход: <span id="pendingScore">—</span>
        </div>

        <div class="action-buttons">
            <button id="btnSubmit" class="action-btn" disabled>Отправить слово</button>
            <button id="btnRecall" class="action-btn" disabled>Сбросить ход</button>
            <button id="btnPass" class="action-btn" disabled>Пас</button>
            <button id="btnSwap" class="action-btn" disabled>Поменять фишки</button>
        </div>
    </div>

</div>

<div id="connStatus" class="conn-status">…</div>
<div id="toast" class="toast hidden"></div>

<script src="js/user_info.js"></script>
<script>updateUserInfo();</script>
<script src="js/api.js"></script>
<script src="js/game_room.js"></script>
</body>
</html>
